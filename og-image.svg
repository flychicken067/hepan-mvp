<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#FAF7F0"/>
  <!-- subtle hairline frame -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#14110E" stroke-width="0.5" stroke-opacity="0.08"/>
  <!-- top eyebrow -->
  <text x="600" y="120" font-family="JetBrains Mono, monospace" font-size="14" letter-spacing="6" fill="#8B8275" text-anchor="middle">CLASSICAL MARRIAGE COMPATIBILITY</text>
  <!-- 合 mark -->
  <text x="600" y="370" font-family="Noto Serif SC, Songti SC, serif" font-weight="900" font-size="320" letter-spacing="0" fill="#B8362A" text-anchor="middle">合</text>
  <!-- subtitle -->
  <text x="600" y="445" font-family="Noto Serif SC, Songti SC, serif" font-weight="600" font-size="32" letter-spacing="12" fill="#14110E" text-anchor="middle">古 籍 合 婚</text>
  <!-- price line -->
  <text x="600" y="490" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="6" fill="#8B8275" text-anchor="middle">¥29 · ONCE · NO SUBSCRIPTION</text>
  <!-- 白贲 vertical right side, four chars stacked -->
  <g font-family="Noto Serif SC, Songti SC, serif" font-size="16" fill="#8B8275" text-anchor="middle" letter-spacing="2">
    <text x="1095" y="305">白</text>
    <text x="1095" y="345">贲</text>
    <text x="1095" y="385">无</text>
    <text x="1095" y="425">咎</text>
  </g>
  <text x="1095" y="455" font-family="JetBrains Mono, monospace" font-size="9" fill="#8B8275" text-anchor="middle" letter-spacing="2">— 周易</text>
  <!-- bottom hairline + tag -->
  <line x1="40" y1="555" x2="1160" y2="555" stroke="#B8362A" stroke-width="0.8" stroke-opacity="0.45"/>
  <text x="60" y="585" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="3" fill="#8B8275">HEPAN-MVP.VERCEL.APP</text>
  <text x="1140" y="585" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="3" fill="#8B8275" text-anchor="end">ZIPING ONTOLOGY · v2</text>
</svg>
